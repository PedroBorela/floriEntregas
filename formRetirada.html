<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Formulário de Retirada</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="iconef.png" type="image/png">
</head>

<body>
    <header>
        <div class="logo">
            <img src="iconef.png" alt="Logo da Empresa">
        </div>
        <nav>
            <ul>
                <li><a href="./form.html">Entrega</a></li>
                <li><a href="./formRetirada.html">Retirada</a></li>
                <li><a href="./pedidos.html">Pedidos</a></li>
            </ul>
        </nav>
    </header>
    <div id="corpoForm">
        <h1>Formulário de Retirada</h1>
        <form id="formularioEntrega">

            <label for="cliente">Cliente: </label>
            <input type="text" name="cliente" placeholder="nome do cliente" id="cliente"><br><br>

            <label for="telefone">Telefone do cliente:</label>
            <input type="text" id="telefone" placeholder="digite o telefone do cliente" name="telefone"
                required><br><br>

            <label for="produtos">Produtos: </label>
            <input type="text" name="produtos" id="produtos" maxlength="500"
                placeholder="digite os produtos e quantidade"><br><br>

            <label for="valorTotalPedido">Valor total do pedido: </label>
            <input type="text" placeholder="digite o valor total do pedido" name="valorTotalPedido"
                id="valorTotalPedido"><br><br>

            <label for="data">Data de retirada: </label>
            <input type="date" name="data" id="data" value="2024-06-12"> <br><br>

            <label for="horario">Horario da retirada: </label>
            <input type="time" name="horario" value="12:00" id="horario"><br><br>


            <label for="nome">nome de quem vai retirar:</label>
            <input type="text" id="nome" placeholder="digite o nome de quem vai retirar" name="nome" required><br><br>

            <label for="tel_receber">Telefone de quem vai retirar:</label>
            <input type="text" name="tel_receber" id="tel_receber"
                placeholder="digite o telefone de quem vai retirar"><br><br>


            <p><label for="cartao">Tem algum cartao? Se sim</label>
                <input type="checkbox" name="cartao" id="cartao">
            </p>

            <label for="mensagem" id="mensagem2" style="display: none;">Mensagem cartão: </label>
            <textarea name="mensagem" id="mensagem" cols="40" style="display: none;" rows="4"
                placeholder="digite a mensagem do cartão"></textarea><br>


            <p><label for="sim">Esta pago?</label>
                <!-- <input type="checkbox" checked name="pago" id="pago"> -->

                <input type="radio" name="pago" id="sim" value="sim" checked
                    onchange="mudarVisibilidadePgIncompleto()">Sim
                <input type="radio" name="pago" id="nao" value="nao" onchange="mudarVisibilidadePgIncompleto()">Não
            </p>

            <div id="pgFinal" style="display: none;">
                <label for="pagamentoFinal">Como será pago? </label>
                <input type="text" placeholder="digite a forma do pagamento final" id="pagamentoFinal"
                    name="pagamentoFinal">
            </div>

            <!-- <select name="valor" id="valor" onchange="mudarVisibilidadePagamento()">
                <option value="total">total</option>
                <option value="parcial">parcial</option>
            </select><br> -->

            <div id="botoes" style="display:none;">
                <input type="radio" id="total" name="valor" value="total" onchange="mudarVisibilidadePagamento()">total
                <input type="radio" id="parcial" name="valor" value="parcial"
                    onchange="mudarVisibilidadePagamento()">parcial
            </div>
            <br>


            <label for="restante" id="restante2" style="display: none;">Valor pago: </label>
            <input type="text" name="restante" id="restante" placeholder="digite o valor pago pelo cliente"
                style="display: none;"><br><br>


            <label for="pagamento">Tipo do pagamento:</label>
            <select name="pagamento" id="pagamento">
                <option value="pix">Pix</option>
                <option value="cartaoCredito">Cartão de crédito</option>
                <option value="cartaoDebito">Cartão de débito</option>
                <option value="dinheiro">Dinheiro</option>
                <option value="linkPg">Link de pagamento</option>
            </select>



            <div id="botoes">
                <input type="button" value="Imprimir Cupom" onclick="imprimirCupom()">
                <input type="button" value="Limpar Formulário" onclick="limparFormulario()">
            </div>
        </form>
    </div>

    <script src="scriptRetirada.js"></script>
</body>

</html>
